spring:
  application:
    name: digital-atm-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/digital_atm}
    username: ${DB_USERNAME:digital_atm}
    password: ${DB_PASSWORD:digital_atm}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:generic_jwt_secret_key}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.portfolio.digitalatm: INFO
